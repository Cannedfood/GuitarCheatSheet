<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Scale Helper</title>
	<script src="index.ts"></script>
	<link rel="stylesheet" href="index.scss">
</head>
<body onload="main()">
	<canvas id="MainCanvas"></canvas>

	<div id="config">
		<div>
			<select id="ModeSelect" onchange="redraw()" class="label">
				<option>Chord</option>
				<option>Scale</option>
			</select>
			<input type="text" name="ChordInput" id="ChordInput" value="C major" onchange="redraw()">
			<!-- <select id="ChordPresets" onchange="if(this.value) { document.getElementById('ChordInput').value = this.value; this.value = ''; redraw(); }">
				<option></option>
				<option>C major</option>
				<option>C minor</option>
				<option>C maj7</option>
				<option>C min7</option>
				<option>C dom</option>
			</select>
			<select id="ScalePresets">
				<option></option>
				<option>C major</option>
				<option>C minor</option>
				<option>C harmonic minor</option>
			</select> -->
		</div>
		<div>
			<label>Tuning</label>
			<input type="text" name="StringsInput" id="StringsInput" value="BEADGBE" onchange="redraw()">
			<button onclick="document.getElementById('StringsInput').value = 'EADGBE'; redraw();" >6 Std.</button>
			<button onclick="document.getElementById('StringsInput').value = 'BEADGBE'; redraw();">7 Std.</button>
			<button onclick="document.getElementById('StringsInput').value = 'AEADGBE'; redraw();">7 Drop-A</button>
		</div>
		<div>
			<label>Theme</label>
			<select id="ThemeSelect" onchange="redraw()">
				<option>Light</option>
				<option>Dark</option>
			</select>
		</div>
		<button id="SaveButton">Save as PNG</button>
	</div>

	<div class="fretboard">
		<div class="string">
			<div class="fret"></div>
			<div class="fret"></div>
		</div>
	</div>
</body>
</html>
