<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Scale Helper</title>
	<script src="index.ts"></script>
	<link rel="stylesheet" href="index.scss">
</head>
<body onload="main()">
	<canvas id="MainCanvas"></canvas>
	<div id="info"></div>
	<div id="config">
		<div>
			<select id="ModeSelect" onchange="redraw()" class="label">
				<option>Chord</option>
				<option>Scale</option>
				<option>Notes</option>
			</select>
			<input type="text" name="ChordInput" id="ChordInput" value="C major" onchange="redraw()">
			<!-- <select id="ChordPresets" onchange="if(this.value) { document.getElementById('ChordInput').value = this.value; this.value = ''; redraw(); }">
				<option></option>
				<option>C major</option>
				<option>C minor</option>
				<option>C maj7</option>
				<option>C min7</option>
				<option>C dom</option>
			</select>
			<select id="ScalePresets">
				<option></option>
				<option>C major</option>
				<option>C minor</option>
				<option>C harmonic minor</option>
			</select> -->
		</div>
		<div>
			<label>Tuning</label>
			<input
				id="StringsInput"
				type="text" name="StringsInput"
				value="B1 E2 A2 D3 G3 B3 E4"
				onchange="setTuning(this.value);">
			<select id="StringsPresets" onchange="setTuning(this.value);">
				<option value=""></option>
				<option value="E2 A2 D3 G3 B3 E4"   > 6 String Guitar          </option>
				<option value="B1 E2 A2 D3 G3 B3 E4"> 7 String Guitar          </option>
				<option value="A1 E2 A2 D3 G3 B3 E4"> 7 String Guitar (Drop-A) </option>
				<option value="E1 A1 D2 G2"         > 4 String Bass            </option>
				<option value="B0 E1 A1 D2 G2"      > 5 String Bass            </option>
				<option value="A0 E1 A1 D2 G2"      > 5 String Bass (Drop-A)   </option>
			</select>
		</div>
		<div>
			<label>Theme</label>
			<select id="ThemeSelect" onchange="setTheme(this.value)">
				<option>Light</option>
				<option>Dark</option>
			</select>
		</div>
		<button id="SaveButton">Save as PNG</button>
	</div>

	<div class="fretboard">
		<div class="string">
			<div class="fret"></div>
			<div class="fret"></div>
		</div>
	</div>
</body>
</html>
