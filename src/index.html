<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Scale Helper</title>
	<script src="index.ts"></script>
	<link rel="stylesheet" href="index.scss">
</head>
<body onload="main()">
	<canvas id="MainCanvas"></canvas>

	<div id="config">
		<div>
			<select id="ModeSelect" onchange="redraw()">
				<option>Chord</option>
				<option>Scale</option>
			</select>
			<input type="text" name="ChordInput" id="ChordInput" value="Cmaj7" onchange="redraw()">
		</div>
		<div>
			<label>Tuning</label>
			<input type="text" name="StringsInput" id="StringsInput" value="BEADGBE" onchange="redraw()">
			<button onclick="document.getElementById('StringsInput').value = 'EADGBE'; redraw();" >6 Std.</button>
			<button onclick="document.getElementById('StringsInput').value = 'BEADGBE'; redraw();">7 Std.</button>
			<button onclick="document.getElementById('StringsInput').value = 'AEADGBE'; redraw();">7 Drop-A</button>
		</div>
		<button id="SaveButton">Save as PNG</button>
	</div>

	<div class="fretboard">
		<div class="string">
			<div class="fret"></div>
			<div class="fret"></div>
		</div>
	</div>
</body>
</html>
